// ======================= LOSOWANIE 30 =======================

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

let exam = shuffle(base.slice(0,60)).slice(0,30);
let current = 0;
let answers = new Array(exam.length).fill(null);

// ======================= ŁADOWANIE PYTANIA =======================

function load(){
let q = exam[current];
document.getElementById("question").innerHTML="<h3>Pytanie "+(current+1)+" z 30</h3><p>"+q.q+"</p>";
let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((text,i)=>{
let btn=document.createElement("button");
btn.className="answer";
btn.innerText=text;
if(answers[current]===i) btn.classList.add("selected");
btn.onclick=()=>{ answers[current]=i; load(); }
ansDiv.appendChild(btn);
});
}

function next(){ if(current<exam.length-1){current++; load();}}
function prev(){ if(current>0){current--; load();}}

// ======================= ZAKOŃCZENIE =======================

function finish(){

let score=0;
let review="";

exam.forEach((q,i)=>{
let isCorrect = answers[i]===q.c;
if(isCorrect) score++;

review+=`
<div style="margin-bottom:15px; padding:10px; background:${isCorrect?"#1e4620":"#4a1c1c"};">
<b>Pytanie ${i+1}:</b> ${q.q}<br>
Twoja odpowiedź: ${answers[i]!==null?q.a[answers[i]]:"Brak odpowiedzi"}<br>
Poprawna odpowiedź: ${q.a[q.c]}<br>
Wynik: ${isCorrect?"✅ DOBRZE":"❌ ŹLE"}
</div>`;
});

let percent=Math.round((score/exam.length)*100);
let passed=percent>=70?"ZALICZONE ✅":"NIEZALICZONE ❌";

document.body.innerHTML=`
<div class="container" id="summary">
<h2>Wynik końcowy</h2>
<h3>${score}/30 (${percent}%)</h3>
<h2>${passed}</h2>
<hr>
${review}
<button onclick="location.reload()">Zrób ponownie</button>
</div>`;
}
function checkPass(){
  if(document.getElementById("pass").value === "OSP2026"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load(); // uruchamia egzamin dopiero po haśle
  } else {
    alert("Błędne hasło");
  }
}
